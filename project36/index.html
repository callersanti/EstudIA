<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <!--Ícono-->
    <link rel="icon" href="images/icon.png" type="image/" sizes="16x16">
    <!--CSS-->
    <link rel="stylesheet" href="css/styles.css">
    <!--Font awesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>Libros por leer</h1>
        </div>
        <!--Agregar tarea-->
        <div class="input-container">
            <input type="text" placeholder="Nueva tarea">
            <button type="button" title="--Agregar"><i class="fa-solid fa-plus"></i></button>

        </div>
        <!--Lista de tareas-->
        <div class="lista">
            <div class="tarea">
                <input type="checkbox" id="t1">
                <label for="t1" class="texto">En agosto nos vemos</label>
                <label for="t1" class="eliminar"><i class="fa-solid fa-trash"></i></label>
            </div>
            <div class="tarea">
                <input type="checkbox" id="t2">
                <label for="t2" class="texto">La vorágine</label>
                <label for="t2" class="eliminar"><i class="fa-solid fa-trash"></i></label>
            </div>
            <div class="tarea">
                <input type="checkbox" id="t3">
                <label for="t3" class="texto">El extranjero</label>
                <label for="t3" class="eliminar"><i class="fa-solid fa-trash"></i></label>
            </div> 
            <div class="tarea">
                <input type="checkbox" id="t4">
                <label for="t4" class="texto">Un beso de Dick</label>
                <label for="t4" class="eliminar"><i class="fa-solid fa-trash"></i></label>
            </div> 
            <div class="tarea">
                <input type="checkbox" id="t5">
                <label for="t5" class="texto">Fahrenheit 451</label>
                <label for="t5" class="eliminar"><i class="fa-solid fa-trash"></i></label>
            </div> 
            <div class="tarea">
                <input type="checkbox" id="t6">
                <label for="t6" class="texto">Hábitos atómicos</label>
                <label for="t6" class="eliminar"><i class="fa-solid fa-trash"></i></label>
            </div> 
            <div class="tarea">
                <input type="checkbox" id="t7">
                <label for="t7" class="texto">Un mundo feliz</label>
                <label for="t7" class="eliminar"><i class="fa-solid fa-trash"></i></label>
            </div> 
            <div class="tarea">
                <input type="checkbox" id="t7">
                <label for="t8" class="texto">1984</label>
                <label for="t8" class="eliminar"><i class="fa-solid fa-trash"></i></label>
            </div> 
            <div class="tarea">
                <input type="checkbox" id="t9">
                <label for="t9" class="texto">Cien años de soledad</label>
                <label for="t9" class="eliminar"><i class="fa-solid fa-trash"></i></label>
            </div> 
            <div class="tarea">
                <input type="checkbox" id="t10">
                <label for="t10" class="texto">La hojarasca</label>
                <label for="t10" class="eliminar"><i class="fa-solid fa-trash"></i></label>
            </div> 

        </div>
    </div>
    <!--Enlace JS-->
    <script src="js/script.js"></script>
</body>
</html>
