<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizaciones</title>
    <!--Icono-->
    <link rel="icon" href="images/icon.png" type="images">
    <!--CSS-->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <h2>Sistema cotizaciones Estud-IA</h2>

    <input type="text" id="client" placeholder="Ingrese nombre del cliente">
    
    <select id="event">
        <option>Seleccione un evento</option>
        <option value="Básico">Boda</option>
        <option value="Cumpleaños">Cumpleaños</option>
        <option value="Empresarial">Empresarial</option>
    </select>

    <select id="package">
        <option>Seleccione un paquete</option>
        <option value="basic">Básico</option>
        <option value="medio">Medio</option>
        <option value="premium">Premium</option>
    </select>

    <button onclick="recuperarDatos()">Generar PDF</button>

    <div id="container"></div>

    <!--Enlace JS-->
    <script src="js/script.js"></script>
    <script src="js/jspdf.js"></script>
    <script src="js/jspdf-autotable.js"></script>

</body>
</html>
