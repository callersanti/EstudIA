<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tarjeta de Presentación</title>
  <!--Icono-->
  <link rel="icon" href="images/icon.png" type="images" sizes="16x16">
  <!--CSS-->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <div class="tarjeta">

    <!-- Avatar -->
    <div class="contenedorAvatar">
      <div class="avatar"><img src="./images/me.jpg" alt="Santiago Calle" style="width: 90px;height: 90px;"></div>
    </div>

    <h1 class="nombre">Santiago Calle</h1>
    <p class="subtitulo">Programador en progreso · Amante de los gatos</p>

    <div class="sobreMi">
      ¡Hola! Soy <span class="resaltado">Santi</span>, aprendiendo a programar en EstudIA.
      Me encantan los <span class="resaltado">gatos</span>, el color <span class="resaltado">morado</span>
      y aprender cada día.
    </div>

    
    <div class="redesSociales">
      <a class="boton botonInstagram"
         href="https://www.instagram.com/callersanti/"
         target="_blank" rel="noopener">
         <img src="./images/instagramIcon.png" alt="instagram" style="width: 18px;">
      </a>
      <a class="boton botonLinkedin"
         href="https://www.linkedin.com/feed/"
         target="_blank" rel="noopener">
         <img src="./images/linkedinIcon.png" alt="linkedin" style="width: 18px;">
      </a>
    </div>
    
  </div>

</body>
</html>
