    <!-- Investigar:
     1. Breve historia de HTML
     2. ¿Qué sucedió en la guerra de los navegadores y fecha?
     3. Breve historia de CSS
     4. Breve historia de JavaScript
    
     Solución
     1. HTML (HyperText Markup Language) fue creado por Tim Berners-Lee en 1991 como un lenguaje de marcado para estructurar contenido en la web.
        La primera versión, HTML 1.0, era muy básica y se centraba en la presentación de texto y enlaces (Su objetivo era permitir compartir documentos 
        científicos mediante enlaces (hipervínculos) en la recién creada World Wide Web).  Con el tiempo, HTML evolucionó para incluir 
        elementos multimedia, formularios y estilos, dando lugar a versiones posteriores como HTML 4.01 y HTML5.
    
     2. La guerra de los navegadores fue un período de competencia intensa entre los principales navegadores web, principalmente 
        Internet Explorer de Microsoft y Netscape Navigator, durante la década de 1990 (1995-2001).  Esto llevó a una competencia agresiva 
        con extensiones propias de HTML, CSS y JavaScript.

     3. CSS (Cascading Style Sheets) fue desarrollado por Håkon Wium Lie en 1994 mientras trabajaba en el CERN.  La primera versión, CSS1, se
        publicó en 1996 y se centró en la presentación visual de los documentos HTML.  CSS permitió a los desarrolladores separar el contenido
        de la presentación, lo que facilitó el mantenimiento y la reutilización de estilos en múltiples documentos.  Con el tiempo, CSS evolucionó
        para incluir características más avanzadas, como diseño de cuadrícula, flexbox y animaciones, dando lugar a CSS2 y CSS3.

     4. JavaScript fue creado por Brendan Eich en 1995 mientras trabajaba en Netscape Communications Corporation. 
        Originalmente llamado Mocha, luego renombrado a LiveScript y finalmente a JavaScript, fue diseñado para agregar interactividad a las 
        páginas web. JavaScript se convirtió rápidamente en un lenguaje de programación esencial para el desarrollo web, permitiendo a los 
        desarrolladores crear aplicaciones web dinámicas y ricas en funcionalidades.  Con el tiempo, JavaScript ha evolucionado con la introducción 
        de nuevas características y mejoras, consolidándose como uno de los lenguajes de programación más populares y ampliamente utilizados 
        en el mundo del desarrollo web.
