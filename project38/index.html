<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boostrap</title>
    <!--Ícono-->
    <link rel="icon" href="images/icon.png" type="image/" sizes="16x16">
    <!--CSS-->
    <link rel="stylesheet" href="css/styles.css">
    <!--Boostrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    
    <h1 class="text-primary">Introducción Bootstrap</h1>
    <p class="text-primary">Primary</p>
    <p class="text-secondary">Secondary</p>
    <p class="text-success">Success</p>
    <p class="text-danger">Danger</p>
    <p class="text-warning">Warning</p>
    <p class="text-info">Info</p>
    <p class="text-dark">Dark</p>
    <p class="text-light">Light</p>

    <!--Colores en tamaño normal-->
    <button class="btn btn-primary">Botón Básico</button>
    <button class="btn btn-secondary">Secondary</button>
    <button class="btn btn-success">Success</button>
    <button class="btn btn-danger">Danger</button>
    <button class="btn btn-warning">Warning</button>
    <button class="btn btn-info">Info</button>
    <button class="btn btn-dark">Dark</button>
    <button class="btn btn-light">Light</button>

    <!--Botón outline-->
    <button class="btn btn-outline-danger">Danger</button>

    <!--Tamaños-->
    <button class="btn btn-secondary btn-lg">Grande</button>
    <button class="btn btn-success btn-sm">Pequeño</button>

    <!--Bloque ancho completo-->
    <button class="btn btn-warning w-100">Ancho completo</button>

    <!--Estado: disabled /active (por defecto)-->
    <button class="btn btn-dark">Activo</button>
    <button class="btn btn-outline-dark disabled">Desactivado</button>

    <!--Botón con ícono-->


    <!--ESPACIADO
    El espaciado se controla con clases utilitarias. Es decir, permiten agregar
    o quitar el espacio externo (margin/m) o interno (padding/p).

        Estructura de las clases: {propiedad}{lado}{tamaño}
    Propiedades-> m y p
    Lado-> t(top), b(bottom), s(left,start), e(end, right), x, y, vacio=todos
    Tamaño-> 0 al 5. sin espacio al más grande.  
    -->


    <!--Enlace JS-->
    <script src="js/script.js"></script>
</body>
</html>
